services:
  - type: web
    name: virtual-ai-photo-studio
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    healthCheckPath: /
    domains:
      - virtualphotostudio.ru
      - www.virtualphotostudio.ru
    buildCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && pnpm install --frozen-lockfile && pnpm --filter @ai-photo-studio/web build
    startCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && pnpm --dir apps/web exec next start -H 0.0.0.0 -p $PORT
    envVars:
      - fromGroup: Virtual-ai-photo-studio
      - key: NODE_VERSION
        value: 20.19.0
      - key: PNPM_VERSION
        value: 10.18.3
      - key: AI_IMAGE_PROVIDER
        value: gemini
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image-preview
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PAYMENT_AMOUNT_CENTS
        value: 99900
      - key: PAYMENT_CURRENCY
        value: rub
      - key: NEXT_PUBLIC_PAYMENTS_ENABLED
        value: true
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: OUTREACH_ADMIN_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_REPLY_TO
        sync: false
  - type: cron
    name: virtual-ai-photo-studio-outreach-collector
    runtime: node
    plan: starter
    branch: main
    schedule: "0 2 1 * *"
    buildCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && pnpm install --frozen-lockfile
    startCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && node scripts/outreach/collect-photo-studios.mjs
    envVars:
      - fromGroup: Virtual-ai-photo-studio
      - key: NODE_VERSION
        value: 20.19.0
      - key: PNPM_VERSION
        value: 10.18.3
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OUTREACH_LIMIT
        value: 10000
      - key: OUTREACH_PROMO_CODE
        value: STUDIO
  - type: cron
    name: virtual-ai-photo-studio-media-cleanup
    runtime: node
    plan: starter
    branch: main
    schedule: "30 3 * * *"
    buildCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && pnpm install --frozen-lockfile
    startCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && node scripts/cleanup-expired-media.mjs
    envVars:
      - fromGroup: Virtual-ai-photo-studio
      - key: NODE_VERSION
        value: 20.19.0
      - key: PNPM_VERSION
        value: 10.18.3
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PHOTO_RETENTION_DAYS
        value: 30
      - key: CLEANUP_BATCH_SIZE
        value: 500
  - type: cron
    name: virtual-ai-photo-studio-outreach-sender
    runtime: node
    plan: starter
    branch: main
    schedule: "0 * * * *"
    buildCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && pnpm install --frozen-lockfile
    startCommand: corepack enable && corepack prepare pnpm@10.18.3 --activate && node scripts/outreach/send-one-lead.mjs
    envVars:
      - fromGroup: Virtual-ai-photo-studio
      - key: NODE_VERSION
        value: 20.19.0
      - key: PNPM_VERSION
        value: 10.18.3
      - key: OUTREACH_AUTO_SEND_ENABLED
        value: true
      - key: OUTREACH_PROMO_CODE
        value: STUDIO
